<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="screen active" id="quiz-start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your knowledge with these fun questions</p>
        <button id="start-btn" class="start-btn btn">Start quiz</button>
      </div>

      <div class="screen" id="quiz-questions-screen">
        <div class="quiz-header">
          <h2 id="question-text">Question here</h2>
          <div class="question-progress">
            <p>
              Question <span id="current-question">1</span> of
              <span id="total-question">5</span>
            </p>
            <p id="score">Score: <span id="score-value">0</span></p>
          </div>
        </div>
        <div id="quiz-choices-container" class="quiz-choices-container">
          <!-- Question will be added later in js -->
        </div>
        <div id="progress-bar" class="progress-bar">
          <div class="progress" id="progress"></div>
        </div>
      </div>

      <div id="result-screen" class="screen">
        <h2>Quiz Results</h2>
        <div class="result-info">
          <p>
            You scored <span id="final-score">0</span> out of
            <span id="max-score">5</span>
          </p>
          <div id="result-msg" class="result-msg">not bad</div>
        </div>
        <button id="restart-btn" class="restart-btn btn">Restart Quiz</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
